pipeline: llm-proxy
description: Per-request LLM cost data from the LLM proxy with org attribution
services:
  producers:
    - getsentry/ops
  consumers:
    - getsentry/snuba
schemas:
  - version: 1
    compatibility_mode: none
    type: json
    resource: snuba-llm-proxy-cost.v1.schema.json
    examples:
      - snuba-llm-proxy-cost/1/
topic_creation_config:
  compression.type: lz4
  retention.ms: "86400000"
  segment.bytes: "262144000"
